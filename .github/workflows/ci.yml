name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs for the same ref — prevents a PR push from queueing
# behind its own older run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          # Share cache across OSes of the same kind. Also key by samples so
          # its lockfile being unresolved doesn't bust the workspace cache.
          shared-key: ${{ matrix.os }}

      - name: Install Linux system deps
        # raylib's bundled glfw needs X11 dev headers to build on Linux.
        # libasound2-dev → audio. libudev-dev → gamepad/input.
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libudev-dev \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev

      - name: Build workspace
        run: cargo build --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Fmt
        run: cargo fmt --all -- --check

      - name: Tests
        run: cargo test --workspace

      - name: Build samples
        working-directory: samples
        run: cargo build
